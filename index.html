<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevate | Self-Objectification Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="noise-overlay"></div>
    
    <header id="main-header">
        <div class="logo">ELEVATE</div>
        <nav>
            <ul>
                <li><a href="#dashboard">Dashboard</a></li>
                <li><a href="#assessments">Assessments</a></li>
                <li><a href="#insights">AI Insights</a></li>
            </ul>
        </nav>
    </header>

    <main id="app-container">
        <!-- Dashboard Section -->
        <section id="dashboard" class="glass-panel">
            <header class="section-header">
                <h2>성장 대시보드</h2>
                <p>현재 당신의 객관적 상태를 한눈에 파악하세요.</p>
            </header>
            <div id="radar-container">
                <!-- RADAR CHART OR SUMMARY COMPONENT WILL GO HERE -->
                <growth-dashboard></growth-dashboard>
            </div>
        </section>

        <!-- Assessment Grid -->
        <section id="assessments">
            <header class="section-header">
                <h2>7대 분야 자기객관화</h2>
                <p>각 카테고리를 선택하여 진단을 시작하세요.</p>
            </header>
            <div class="pillar-grid">
                <!-- Pillar cards will be dynamically rendered or static components -->
                <pillar-card type="exercise" label="운동" icon="💪"></pillar-card>
                <pillar-card type="diet" label="식단" icon="🥗"></pillar-card>
                <pillar-card type="skin" label="피부" icon="✨"></pillar-card>
                <pillar-card type="fashion" label="패션" icon="👔"></pillar-card>
                <pillar-card type="hair" label="헤어" icon="💇"></pillar-card>
                <pillar-card type="dating" label="연애" icon="❤️"></pillar-card>
                <pillar-card type="career" label="본업" icon="💼"></pillar-card>
            </div>
        </section>
</main>

<ai-insight-panel></ai-insight-panel>
<script type="module" src="main.js"></script>
</body>
</html>
